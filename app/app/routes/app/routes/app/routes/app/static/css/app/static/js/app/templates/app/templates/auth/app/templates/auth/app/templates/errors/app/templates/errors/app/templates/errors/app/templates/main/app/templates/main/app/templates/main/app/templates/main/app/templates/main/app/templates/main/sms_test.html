{% extends "base.html" %}
{% block title %}SMS Test Panel{% endblock %}
{% block content %}
<div class="container-fluid">
    <h3 class="mb-4">🧪 SMS Test Panel</h3>
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <h5 class="card-title">Send Test SMS</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Sender ID</label>
                        <input type="text" name="sender" class="form-control" value="ALROSY">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Recipient Number</label>
                        <input type="text" name="recipient" class="form-control" placeholder="+1234567890" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="message" class="form-control" rows="4" required>Test SMS from ALROSY Panel</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Send SMS</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
