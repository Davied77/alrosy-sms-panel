{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="container-fluid">
    <h3 class="mb-4">⚙️ Settings</h3>
    <div class="card">
        <form method="POST">
            <div class="mb-3"><label class="form-label">Site Name</label><input type="text" class="form-control" value="ALROSY SMS Panel"></div>
            <div class="mb-3"><label class="form-label">SMS API URL</label><input type="text" class="form-control" placeholder="https://api.example.com"></div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
    </div>
</div>
{% endblock %}
