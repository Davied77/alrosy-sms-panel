{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <h3 class="mb-4">News Management</h3>
    
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#createNewsModal">
        <i class="bi bi-plus-circle"></i> Add News
    </button>
    
    {% for news in news_list %}
    <div class="card mb-2">
        <div class="d-flex justify-content-between">
            <h5>{{ news.title }}</h5>
            <a href="{{ url_for('admin.delete_news', news_id=news.id) }}" class="btn btn-sm btn-danger">Delete</a>
        </div>
        <p>{{ news.content }}</p>
        <small class="text-muted">{{ news.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
    </div>
    {% endfor %}
</div>

<div class="modal fade" id="createNewsModal">
    <div class="modal-dialog">
        <div class="modal-content bg-dark">
            <div class="modal-header">
                <h5>Create News</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('admin.create_news') }}">
                <div class="modal-body">
                    <input type="text" name="title" class="form-control mb-2" placeholder="Title" required>
                    <textarea name="content" class="form-control mb-2" rows="5" placeholder="Content"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Publish</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
