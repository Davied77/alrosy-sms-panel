{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <h3 class="mb-4">SMS Ranges Management</h3>
    
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#createRangeModal">
        <i class="bi bi-plus-circle"></i> Add Range
    </button>
    
    <div class="card">
        <div class="table-responsive">
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Country</th>
                        <th>Prefix</th>
                        <th>Total</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    {% for range in ranges %}
                    <tr>
                        <td>{{ range.name }}</td>
                        <td>{{ range.country }}</td>
                        <td>{{ range.prefix }}</td>
                        <td>{{ range.total_numbers }}</td>
                        <td>${{ "%.3f"|format(range.price) }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="createRangeModal">
    <div class="modal-dialog">
        <div class="modal-content bg-dark">
            <div class="modal-header">
                <h5>Create SMS Range</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('admin.create_sms_range') }}">
                <div class="modal-body">
                    <input type="text" name="name" class="form-control mb-2" placeholder="Range Name" required>
                    <input type="text" name="country" class="form-control mb-2" placeholder="Country">
                    <input type="text" name="prefix" class="form-control mb-2" placeholder="Prefix">
                    <input type="number" name="total_numbers" class="form-control mb-2" placeholder="Total Numbers">
                    <input type="number" step="0.001" name="price" class="form-control mb-2" placeholder="Price">
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
